name: CD

on:
  push:
    tags:
      - "v*"  # Triggered only by version tags: v0.1.0, v1.2.3, etc.

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for hatch-vcs to resolve the version from the tag

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - run: uv build

      - name: Verify universal wheel
        shell: bash
        run: |
          ls dist/
          ls dist/ | grep "py3-none-any.whl" || (echo "ERROR: expected a universal wheel (py3-none-any)" && exit 1)

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  verify-install:
    name: Verify (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.9", "3.10", "3.11", "3.12" ]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install wheel (no heavy deps)
        shell: bash
        run: uv pip install --system dist/*.whl --no-deps

      - name: Smoke test — CLI entrypoint
        shell: bash
        # yolo-scout --help must exit 0 and print usage.
        run: yolo-scout --help

  publish:
    name: Publish to PyPI
    needs: verify-install
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create a release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so --generate-notes can diff against the previous tag

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/*.whl dist/*.tar.gz \
            --title "${{ github.ref_name }}" \
            --generate-notes
