# YOLO Scout 🔍 MIT License - https://github.com/HuggingFaceM4/yolo-scout
# Default configuration for YOLO dataset quality analysis.
# All parameters can be overridden on the CLI: yolo-scout key=value

# Dataset settings
data: # (str) path to YOLO dataset directory or YAML file
task: detect # (str) dataset task: detect | classify | segment | pose | obb
name: # (str, optional) FiftyOne dataset name; auto-generated from path if empty, also used for thumbnail directory
reload: false # (bool) force reload dataset even if already cached in FiftyOne

# Embeddings settings
skip_embeddings: false # (bool) skip CLIP embedding computation
model: openai_clip # (str) embeddings model: openai_clip | metaclip_400m | metaclip_fullcc | siglip_base_224
batch: 16 # (int) batch size for embedding computation
mask_background: true # (bool) mask background in patch crops for segment/OBB tasks

# Thumbnail settings
thumbnail_dir: yolo_scout/thumbnails # (str) directory to save thumbnails
thumbnail_width: 800 # (int) thumbnail width in pixels; height is auto-scaled

# Quality settings
skip_quality: false # (bool) skip image quality metrics computation

# App settings
port: 5151 # (int) port for the FiftyOne app
skip_launch: false # (bool) skip launching the FiftyOne app after processing
